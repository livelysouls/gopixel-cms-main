<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoPixel CMS - Smarter Web Engineering</title>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #0f172a;
      }
      .preloader-container {
        display: flex;
        align-items: center;
        justify-content: center;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #0f172a;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
        z-index: 9999;
        overflow: hidden;
      }
      .preloader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        max-width: 320px;
        padding: 24px;
      }
      .logo-symbol-wrapper {
        position: relative;
        width: 144px;
        height: 112px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 8px;
      }
      .logo-svg {
        width: 100%;
        height: 100%;
        filter: drop-shadow(0 4px 12px rgba(239, 68, 68, 0.15));
        animation: logoPulse 2s infinite ease-in-out;
      }
      .brand-text {
        font-size: 24px;
        font-weight: 900;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 4px;
      }
      .brand-go {
        color: #ffffff;
      }
      .brand-pixel {
        background: linear-gradient(to right, #f97316, #ec4899, #a855f7);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .tagline {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 9px;
        font-weight: bold;
        letter-spacing: 0.25em;
        color: #94a3b8;
        text-transform: uppercase;
        margin-top: 8px;
        width: 100%;
      }
      .bullet {
        color: #f97316;
      }
      .subtitle {
        font-size: 7.5px;
        font-weight: 500;
        letter-spacing: 0.35em;
        color: #64748b;
        text-transform: uppercase;
        margin-top: 4px;
      }
      .progress-bar-container {
        width: 160px;
        height: 3px;
        background-color: rgba(255, 255, 255, 0.1);
        border-radius: 9999px;
        margin-top: 24px;
        overflow: hidden;
        position: relative;
      }
      .progress-bar-fill {
        width: 40%;
        height: 100%;
        background: linear-gradient(to right, #f97316, #ec4899, #a855f7);
        border-radius: 9999px;
        animation: progressAnim 1.5s infinite ease-in-out;
        position: absolute;
      }
      .loading-text {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.1em;
        color: #64748b;
        text-transform: uppercase;
        margin-top: 12px;
        animation: textPulse 1.5s infinite ease-in-out;
      }
      @keyframes logoPulse {
        0%, 100% {
          transform: scale(1);
          filter: drop-shadow(0 4px 12px rgba(239, 68, 68, 0.15));
        }
        50% {
          transform: scale(1.02);
          filter: drop-shadow(0 6px 16px rgba(239, 68, 68, 0.25));
        }
      }
      @keyframes progressAnim {
        0% {
          left: -40%;
        }
        50% {
          left: 100%;
        }
        100% {
          left: -40%;
        }
      }
      @keyframes textPulse {
        0%, 100% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="preloader-container" id="gopixel-preloader">
        <div class="preloader-content">
          <div class="logo-symbol-wrapper">
            <svg
              viewBox="0 0 200 120"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              class="logo-svg"
            >
              <defs>
                <linearGradient id="silverG" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#FFFFFF" />
                  <stop offset="100%" stop-color="#CBD5E1" />
                </linearGradient>
                <linearGradient id="gradientP" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#F97316" />
                  <stop offset="50%" stop-color="#EC4899" />
                  <stop offset="100%" stop-color="#A855F7" />
                </linearGradient>
              </defs>
              <path
                d="M90 20 C50 20, 25 45, 25 70 C25 95, 50 110, 90 110 C105 110, 115 105, 120 98 C120 85, 120 80, 120 80 L80 80 L80 65 L140 65 C141 75, 140 100, 125 110 C112 118, 98 120, 90 120 C40 120, 10 95, 10 65 C10 35, 40 10, 90 10"
                fill="url(#silverG)"
              />
              <path
                d="M85 30 L135 30 C165 30, 175 48, 160 62 C145 74, 125 72, 105 72 L85 72 Z"
                stroke="url(#gradientP)"
                stroke-width="20"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M95 30 L95 110"
                stroke="url(#gradientP)"
                stroke-width="20"
                stroke-linecap="round"
              />
              <path
                d="M85 30 L130 30"
                stroke="url(#silverG)"
                stroke-width="10"
                stroke-linecap="round"
              />
              <rect x="155" y="10" width="8" height="8" fill="#F97316" />
              <rect x="165" y="18" width="8" height="8" fill="#EC4899" />
              <rect x="175" y="12" width="6" height="6" fill="#A855F7" />
              <rect x="145" y="24" width="7" height="7" fill="#EA580C" />
              <rect x="158" y="28" width="9" height="9" fill="#E11D48" />
              <rect x="170" y="32" width="8" height="8" fill="#D946EF" />
              <rect x="148" y="14" width="5" height="5" fill="#94A3B8" />
              <rect x="180" y="24" width="6" height="6" fill="#F59E0B" />
              <rect x="163" y="6" width="5" height="5" fill="#8B5CF6" />
            </svg>
          </div>
          <div class="brand-text">
            <span class="brand-go">GO</span><span class="brand-pixel">PIXEL</span>
          </div>
          <div class="tagline">
            DESIGN <span class="bullet">•</span> DEVELOP <span class="bullet">•</span> GROW
          </div>
          <div class="subtitle">
            DIGITAL SOLUTIONS FOR MODERN BRANDS
          </div>
          <div class="progress-bar-container">
            <div class="progress-bar-fill"></div>
          </div>
          <div class="loading-text">Loading CMS Console...</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
